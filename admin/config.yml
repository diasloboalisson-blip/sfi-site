# ==========================================================================
#  SFi Gestão Estratégica (Versão Moderna) — Painel de Conteúdo (Decap CMS)
#  Autenticação: DecapBridge (PKCE / Login com Google)
# ==========================================================================
backend:
  name: git-gateway
  repo: diasloboalisson-blip/sfi-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/77e61598-1e53-447b-bd4f-27cdf3778296/pkce
  auth_token_endpoint: /sites/77e61598-1e53-447b-bd4f-27cdf3778296/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://sfi-site.pages.dev

locale: pt
media_folder: "assets/uploads"
public_folder: "assets/uploads"
collections:
  # ----- ARTIGOS (Mídia) -----
  - name: "artigos"
    label: "Artigos (Mídia)"
    description: "Artigos exibidos na página Mídia. O mais recente aparece primeiro."
    files:
      - name: "lista"
        label: "Lista de Artigos"
        file: "content/articles.json"
        format: json
        fields:
          - label: "Artigos"
            name: "items"
            label_singular: "Artigo"
            widget: "list"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Categoria", name: "cat", widget: "string", hint: "Ex.: Segurança Pública, Governança, Direito Digital..."}
              - {label: "Data", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD"}
              - {label: "Link do artigo (URL do P7)", name: "url", widget: "string"}
              - {label: "Miniatura", name: "thumb", widget: "image", required: false, hint: "Foto/infográfico do card. Se vazio, use uma imagem padrão."}
              - {label: "É infográfico? (mostra a imagem inteira)", name: "info", widget: "boolean", default: false}
              - {label: "Resumo (opcional)", name: "excerpt", widget: "text", required: false}
              - {label: "Status", name: "status", widget: "select", options: ["Publicado","Rascunho"], default: "Publicado"}
  # ----- VÍDEO EM DESTAQUE -----
  - name: "video"
    label: "Vídeo em destaque"
    description: "Vídeo/entrevista exibido na página Mídia."
    files:
      - name: "destaque"
        label: "Vídeo em destaque"
        file: "content/video.json"
        format: json
        fields:
          - {label: "ID do YouTube", name: "id", widget: "string", hint: "Só o código após v= (ex.: FlXqrp8NHsw)."}
          - {label: "Título", name: "title", widget: "string"}
          - {label: "Canal / Veículo", name: "channel", widget: "string"}
          - {label: "Data", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD"}
          - {label: "Descrição", name: "desc", widget: "text"}
  # ----- SOBRE O FUNDADOR (foto e bio) -----
  - name: "perfil"
    label: "Sobre o Fundador (foto e bio)"
    description: "Foto, resumo e biografia exibidos na página Sobre."
    files:
      - name: "sobre"
        label: "Sobre o Fundador"
        file: "content/sobre.json"
        format: json
        fields:
          - {label: "Foto", name: "photo", widget: "image", hint: "Retrato vertical. Substitui a foto da página Sobre."}
          - {label: "Resumo (linha abaixo do nome)", name: "sub", widget: "text"}
          - {label: "Biografia", name: "bio", widget: "text", hint: "Separe cada parágrafo deixando UMA linha em branco entre eles."}

  # ----- ÁREAS DE ATUAÇÃO -----
  - name: "areas"
    label: "Áreas de Atuação"
    description: "As frentes de trabalho exibidas na página Áreas."
    files:
      - name: "lista"
        label: "Lista de Áreas"
        file: "content/areas.json"
        format: json
        fields:
          - label: "Áreas"
            name: "items"
            label_singular: "Área"
            widget: "list"
            summary: "{{fields.num}} — {{fields.title}}"
            fields:
              - {label: "Número", name: "num", widget: "string", hint: "Ex.: 01, 02, 03..."}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Descrição", name: "desc", widget: "text"}

  # ----- PUBLICAÇÕES -----
  - name: "publicacoes"
    label: "Publicações (Livros)"
    description: "Obras exibidas na página Publicações."
    files:
      - name: "lista"
        label: "Lista de Obras"
        file: "content/publicacoes.json"
        format: json
        fields:
          - label: "Obras"
            name: "items"
            label_singular: "Obra"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Capa", name: "image", widget: "image"}
              - {label: "Editora / Linha", name: "ed", widget: "string", hint: "Ex.: Editora Dialética · Livro 1"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Subtítulo", name: "tag", widget: "string", required: false}
              - {label: "Descrição", name: "body", widget: "text", hint: "Separe os parágrafos com UMA linha em branco."}
              - label: "Botões de compra"
                name: "links"
                widget: "list"
                required: false
                label_singular: "Botão"
                summary: "{{fields.label}}"
                fields:
                  - {label: "Texto do botão", name: "label", widget: "string"}
                  - {label: "Link (URL)", name: "url", widget: "string"}
                  - {label: "Botão de destaque?", name: "primary", widget: "boolean", default: false}
