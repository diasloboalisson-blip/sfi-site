# ==========================================================================
#  SFi Gestão Estratégica (Versão Moderna) — Painel de Conteúdo (Decap CMS)
#  Autenticação: DecapBridge (PKCE / Login com Google)
# ==========================================================================
backend:
  name: git-gateway
  repo: diasloboalisson-blip/sfi-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/77e61598-1e53-447b-bd4f-27cdf3778296/pkce
  auth_token_endpoint: /sites/77e61598-1e53-447b-bd4f-27cdf3778296/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://sfi-site.pages.dev

locale: pt
media_folder: "assets/uploads"
public_folder: "assets/uploads"
collections:
  # ----- ARTIGOS (Mídia) -----
  - name: "artigos"
    label: "Artigos (Mídia)"
    description: "Artigos exibidos na página Mídia. O mais recente aparece primeiro."
    files:
      - name: "lista"
        label: "Lista de Artigos"
        file: "content/articles.json"
        format: json
        fields:
          - label: "Artigos"
            name: "items"
            label_singular: "Artigo"
            widget: "list"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Categoria", name: "cat", widget: "string", hint: "Ex.: Segurança Pública, Governança, Direito Digital..."}
              - {label: "Data", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD"}
              - {label: "Link do artigo (URL do P7)", name: "url", widget: "string"}
              - {label: "Miniatura", name: "thumb", widget: "image", required: false, hint: "Foto/infográfico do card. Se vazio, use uma imagem padrão."}
              - {label: "É infográfico? (mostra a imagem inteira)", name: "info", widget: "boolean", default: false}
              - {label: "Resumo (opcional)", name: "excerpt", widget: "text", required: false}
              - {label: "Status", name: "status", widget: "select", options: ["Publicado","Rascunho"], default: "Publicado"}
  # ----- VÍDEO EM DESTAQUE -----
  - name: "video"
    label: "Vídeo em destaque"
    description: "Vídeo/entrevista exibido na página Mídia."
    files:
      - name: "destaque"
        label: "Vídeo em destaque"
        file: "content/video.json"
        format: json
        fields:
          - {label: "ID do YouTube", name: "id", widget: "string", hint: "Só o código após v= (ex.: FlXqrp8NHsw)."}
          - {label: "Título", name: "title", widget: "string"}
          - {label: "Canal / Veículo", name: "channel", widget: "string"}
          - {label: "Data", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD"}
          - {label: "Descrição", name: "desc", widget: "text"}